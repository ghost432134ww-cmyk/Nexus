<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HNFAK CINEMA - ULTIMATE</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{'name':'HNFAK CINEMA','short_name':'HNFAK','start_url':'.','display':'standalone','background_color':'#000','theme_color':'#e50914'}">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #e50914; --bg: #050505; --card: #181818; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: linear-gradient(to bottom, #000, transparent); position: fixed; top: 0; width: 90%; z-index: 2000; }
        .logo { color: var(--red); font-size: 26px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 10px rgba(229, 9, 20, 0.5); }

        /* PLAYER AREA (AD-SHIELD & FULLSCREEN INTEGRATED) */
        .player-zone { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; margin-top: 0; box-shadow: 0 10px 30px #000; }
        video, iframe { width: 100%; height: 100%; border: none; background: #000; }
        
        /* AD-SHIELD (REKLAM ATLATICI) */
        #ad-shield { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .skip-btn { background: #fff; color: #000; padding: 14px 35px; font-weight: 900; border-radius: 4px; cursor: pointer; border: none; font-size: 16px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.4); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255,255,255,0); } 100% { transform: scale(1); } }

        /* CONTROLS */
        .floating-fs { position: absolute; bottom: 20px; right: 20px; background: var(--red); color: #fff; border: none; padding: 12px 18px; border-radius: 4px; font-weight: 900; cursor: pointer; z-index: 1100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* CATEGORIES & CARDS */
        .main-content { padding: 40px 5%; }
        .row-name { font-size: 20px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .row-name::before { content: ''; width: 4px; height: 20px; background: var(--red); display: inline-block; border-radius: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; margin-bottom: 40px; }

        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; border: 1px solid #222; }
        .card:hover, .card:focus { transform: translateY(-10px) scale(1.05); border-color: #fff; z-index: 10; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .card:hover img { opacity: 1; }
        .card-label { padding: 12px; font-size: 13px; font-weight: 700; text-align: center; display: block; color: #eee; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #111; padding: 35px; border-radius: 15px; width: 85%; max-width: 400px; border: 1px solid #333; box-shadow: 0 0 40px var(--red); }
        input { width: 100%; padding: 15px; margin-bottom: 20px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--red); }
        .action-btn { width: 100%; padding: 15px; background: var(--red); color: #fff; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; }

        /* TV & NAVIGATION HINTS */
        .hint { position: fixed; bottom: 10px; left: 10px; font-size: 9px; color: #444; }
    </style>
</head>
<body>

<div id="ad-shield">
    <div style="color:var(--red); font-weight:900; margin-bottom:20px; letter-spacing:3px;">HNFAK AD-BLOCKER ACTIVE</div>
    <button class="skip-btn" onclick="skipAd()">REKLAMI ATLA</button>
</div>

<header class="header">
    <div class="logo">HNFAK CINEMA</div>
    <button onclick="openM()" style="background:transparent; border:1px solid #444; color:#fff; padding:8px 15px; border-radius:20px; cursor:pointer;">+ Kanal Ekle</button>
</header>

<div class="player-zone" id="v-zone">
    <video id="main-v" autoplay controls playsinline></video>
    <iframe id="main-i" style="display:none" sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>
    <button class="floating-fs" onclick="goFS()">TAM EKRAN</button>
</div>

<div class="main-content">
    <div class="row-name">Sultan Kadir'in Favorileri</div>
    <div class="grid" id="main-grid"></div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h2 style="color:var(--red); margin-top:0;">Yeni Boyut Ekle</h2>
        <input id="in-n" placeholder="Kanal İsmi">
        <input id="in-u" placeholder="URL (m3u8 veya Site)">
        <button class="action-btn" onclick="save()">SİSTEME KAYDET</button>
        <button class="action-btn" style="background:#333; margin-top:10px;" onclick="closeM()">İPTAL</button>
    </div>
</div>

<div class="hint">HNFAK CINEMA OS V24 | TV & ANDROID & IOS COMPATIBLE</div>

<script>
    const vid = document.getElementById('main-v');
    const ifr = document.getElementById('main-i');
    const shield = document.getElementById('ad-shield');
    let hls = new Hls();
    let customs = JSON.parse(localStorage.getItem('hn_v24_data')) || [];

    const baseChannels = [
        {n:"TRT 1", u:"https://tv-trt1.medya.trt.com.tr/master.m3u8", t:"hls"},
        {n:"TRT SPOR", u:"https://tv-trtsporyildiz.medya.trt.com.tr/master.m3u8", t:"hls"},
        {n:"ATV", u:"https://atv-live.daioncdn.net/atv/atv.m3u8", t:"hls"},
        {n:"KANAL D", u:"https://demiroren-live.daioncdn.net/kanald/kanald.m3u8", t:"hls"},
        {n:"BEIN SPORTS 1", u:"https://futboltv.az/live/bein-sport-1.html?yayin=sd", t:"site"}
    ];

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = "";
        [...baseChannels, ...customs].forEach((ch, index) => {
            const card = document.createElement('div');
            card.className = "card";
            card.tabIndex = index + 1;
            card.innerHTML = `
                <img src="https://via.placeholder.com/400x225/000/e50914?text=${ch.n}">
                <span class="card-label">${ch.n}</span>
            `;
            card.onclick = () => play(ch);
            card.onkeydown = (e) => { if(e.key === "Enter") play(ch); };
            grid.appendChild(card);
        });
    }

    function play(ch) {
        window.scrollTo({top: 0, behavior: 'smooth'});
        if(ch.t === 'site') {
            vid.style.display='none'; ifr.style.display='block'; ifr.src=ch.u;
            hls.destroy(); vid.pause();
            shield.style.display = 'flex'; // Reklam kalkanı
        } else {
            vid.style.display='block'; ifr.style.display='none'; ifr.src="";
            shield.style.display = 'none';
            if(Hls.isSupported()){
                hls.destroy(); hls = new Hls();
                hls.loadSource(ch.u); hls.attachMedia(vid);
                hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(()=>{}));
            }
        }
    }

    function skipAd() {
        shield.style.display = 'none';
        const current = ifr.src;
        ifr.src = current; // Reklamları temizlemek için yenile
    }

    function goFS() {
        const el = vid.style.display !== 'none' ? vid : document.getElementById('v-zone');
        if(el.requestFullscreen) el.requestFullscreen();
        else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    function openM() { document.getElementById('modal').style.display='flex'; }
    function closeM() { document.getElementById('modal').style.display='none'; }
    function save() {
        const n = document.getElementById('in-n').value, u = document.getElementById('in-u').value;
        if(n && u) {
            customs.push({n, u, t: u.includes('m3u8')?'hls':'site'});
            localStorage.setItem('hn_v24_data', JSON.stringify(customs));
            render(); closeM();
        }
    }

    window.onload = () => {
        render();
        // Android ana ekrana ekleme (PWA) tetikleyici
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch",()=>{})');
        }
    };
</script>
</body>
</html>
